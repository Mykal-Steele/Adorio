            data.forEach(question => {

                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
            });

            return data;
        }

            return JSON.parse(JSON.stringify(data));

            2: `A context switch means the processor stops one program and starts another, so old address translations in the Translation Lookaside Buffer, or TLB, are no longer valid. If too many programs are loaded at once, memory fills up, pages start moving between RAM and disk, and the system slows down because it spends time waiting on the disk instead of doing useful work.`,
            3: `A race condition happens when two or more threads use shared data and the result depends on which one runs first. The issue is timing, not a permanent blockage; different execution orders can produce different final answers.`,
            4: `The code looks like one action, but the processor really does it in steps: read the value from memory, add one, and write it back. If another process interrupts between those steps, both processes can work from the same old number and one update gets lost.`,
            5: `Bounded waiting is a fairness rule. Even if the system keeps making progress, it still fails this rule if one process can wait forever while other processes keep getting into the critical section again and again.`,
            6: `Turning off timer interrupts is not a real solution for synchronization. It only affects one processor core, other cores still run, a bad program can freeze the machine by never re-enabling interrupts, and the timer interrupts are also needed for keeping time and scheduling.`,
            7: `Modern processors often reorder memory reads and writes to run faster, but that can confuse concurrent programs. A memory barrier, also called a fence, tells the processor to finish memory operations in the correct order so other threads see updates the way the program intended.`,
            8: `Peterson's solution uses two intent flags and a turn variable so that only one of the two processes can enter the critical section. It works only if the hardware keeps memory operations in the right order, and if one process crashes while its flag is still set, the other process may wait forever.`,
            9: `A spinlock is a lock that does not sleep. While the lock is busy, the process keeps checking it in a loop, which wastes CPU time; that is why spinlocks are only good when the wait is expected to be very short.`,

            11: `A mutex has ownership, which means the thread that locks it must be the one that unlocks it. A semaphore does not have that rule, so one thread can wait and a different thread can signal.`,
            12: `A condition variable does not remember old signals. If nobody is waiting when x.signal() is called, the signal disappears and nothing is saved for later.`,
            13: `This is priority inversion: a high-priority process is blocked by a low-priority process that holds the lock, while a medium-priority process keeps running. Priority inheritance fixes it by temporarily giving the low-priority process the higher priority so it can finish and release the lock.`,
            14: `The producer takes the mutex first and then waits for space in the buffer. If the buffer is full, it can end up holding the lock while waiting, which prevents the consumer from entering and creates deadlock.`,
            15: `The first readers-writers solution lets readers keep coming in, so the reader count may never drop to zero. If that happens, the writer never gets the mutex and can starve forever.`,
            16: `Each correct fix removes the deadlock in a different way. One fix makes chopstick pickup all-or-nothing, one limits the room so not everyone can sit at once, and one changes the pickup order so the philosophers stop forming the same circular wait pattern.`,
            17: `These are other ways to handle shared data, not just basic locks and semaphores. Transactional memory groups updates into one all-or-nothing block, immutable programming avoids shared changes, and OpenMP critical sections give a higher-level way to protect code that touches shared data.`,
            18: `Deadlock needs four conditions at the same time: mutual exclusion, hold and wait, no preemption, and circular wait. If even one of those is missing, the usual deadlock pattern cannot form.`,
            19: `This is deadlock because each process grabs one semaphore and then waits for the other one. Once P0 has S1 and P1 has S2, neither process can continue because each one needs a resource already held by the other.`,
            20: `A cycle means different things depending on the resources. If each resource has only one copy, a cycle guarantees deadlock. If a resource has multiple copies, a cycle can still be harmless because there may be enough free copies left to keep the system moving.`,
            21: `The practical way to prevent circular wait is to force every process to ask for resources in one fixed order. If everyone requests lower-numbered resources before higher-numbered ones, a waiting loop cannot form.`,
            22: `Unsafe does not mean deadlocked yet. It means the system can no longer prove that every process can finish safely if future requests arrive, so the operating system has lost its safety guarantee.`,
            23: `Need is the maximum claim minus what the thread already has, so 5 minus 2 equals 3. Banker then checks whether the available resources are enough to cover that remaining need for every resource type before allowing the thread to run.`,
            24: `Before testing safety, the operating system pretends the request has already been granted. That means available resources go down, allocation goes up, and remaining need goes down by the same amount, because the algorithm is simulating the system after the request.`,
            25: `If the operating system preempts a process without remembering rollback history, it may choose the same victim over and over. That is a problem because one process keeps losing its work while everyone else gets to keep going, which creates starvation.`,
            26: `The chef analogy works because it compares speed and size. Hands are like registers because they are closest and fastest, the cutting board is like cache because it is used constantly, the fridge is like RAM because it holds more but is slower, and the supermarket is like a hard disk drive because it is the biggest and slowest storage.`,
            27: `Compile-time binding fixes addresses early, so the program has to be rebuilt if it moves. Load-time binding waits until the program is loaded, and execution-time binding keeps adjusting addresses while the program runs using the Memory Management Unit, or MMU.`,
            28: `Dynamic loading waits until code is actually needed before bringing it into memory, which saves RAM. Dynamic linking lets many programs share one copy of a library by using small stubs that point to the shared code instead of copying it into every program.`,
            29: `Best-fit chooses the smallest hole that can still hold the process, so 600 KB is the best choice here. Worst-fit chooses the largest hole, so 750 KB is the worst-fit choice.`,
            30: `Paging removes external fragmentation because memory is split into fixed-size pieces. Since any page can go into any free frame, the operating system does not need one large continuous hole.`,
            31: `The page offset is the part of the address that points inside the page, so it does not change during translation. The Memory Management Unit changes only the page number to a frame number; the offset stays the same because pages and frames are the same size.`,
            32: `A logical address is made from the page number and the page offset. Six bits are needed for 64 pages, and ten bits are needed for 1024 words per page, so the total logical address size is 16 bits.`,
            33: `A context switch means a new process is now running, so the old Translation Lookaside Buffer entries do not match the new page table. The buffer has to be flushed or invalidated so the processor does not use stale address translations.`,
            34: `Effective access time is a weighted average of the fast case and the slow case. A TLB hit takes 20ns plus one RAM access, while a TLB miss takes 20ns plus two RAM accesses, and with an 80% hit rate the average works out to 140ns.`,
            35: `These are real hardware facts about paging. The x86-64 architecture uses a multi-level page table so it does not need one giant table, ARMv8 uses multiple TLB levels with separate instruction and data caches for translations, and an inverted page table keeps one entry per physical frame instead of one per logical page.`,
            36: `A page fault is a normal recovery path, not a single step. The processor traps to the operating system, the operating system checks whether the access is valid, finds a free frame, reads the page from disk, updates the page table, and then restarts the instruction that failed.`,
            37: `The fault probability has to be tiny because one page fault is far more expensive than a normal RAM access. If the fault takes 8,000,000ns, the chance of a fault must be about 0.00000125 to keep the average access time under 210ns.`,
            38: `Copy-on-write makes fork fast by sharing the parent's physical pages at first. The operating system only makes a private copy when one process tries to write, which avoids copying a lot of memory that might never change.`,
            39: `Optimal page replacement is the benchmark because it removes the page that will not be used for the longest time in the future, which is impossible to know in a real system. FIFO is simple but weak because it removes the oldest page instead of the least useful one, and second chance improves FIFO by checking a reference bit before eviction.`,
            40: `Belady's anomaly means adding more frames can sometimes cause more page faults instead of fewer. FIFO is the classic page replacement algorithm that shows this strange behavior.`,
            41: `For LRU, the page that was used least recently is removed, which is 4 in this trace. For FIFO, the page that has been in memory the longest is removed, which is 3, because FIFO cares about arrival order, not recent use.`,
            42: `Memory compression helps by squeezing inactive pages into fewer RAM frames. That frees space quickly and lets the operating system avoid going to disk until it really has to.`,
            43: `Thrashing is a bad feedback loop. Too many page faults lower CPU use, the scheduler adds more processes to try to improve it, those processes steal more frames, and the page fault rate gets even worse until the system is overwhelmed.`,
            44: `If the total working set demand is bigger than physical memory, the system cannot keep all active programs in memory at once. The usual fix is to suspend or swap out some processes so fewer programs compete for frames.`,
            45: `For a hard disk drive, positioning time is the time needed to get the head to the right spot on the disk. That is why it equals seek time plus rotational latency, and a head crash is when the head physically touches the platter and damages data.`,
            46: `Solid state drives work differently from hard drives. They use wear leveling to spread writes across cells, a Flash Translation Layer to map logical blocks to physical pages, garbage collection because flash cannot just overwrite in place, and they have zero seek time because there is no moving arm.`,
            47: `Disk scheduling algorithms are designed to reduce head movement on mechanical hard drives. Solid state drives have no moving head, so seek time is already basically zero, which makes SCAN and C-SCAN unnecessary for performance.`,
            48: `C-SCAN keeps moving in one direction, services requests on the way, goes to the end, jumps back to the start, and then continues. That is why the service path is 53 -> 65 -> 67 -> 98 -> 122 -> 124 -> 183 -> 199 -> 0 -> 14 -> 37.`,
            49: `NAS is file storage over a network, so clients ask for files using protocols like NFS or SMB. SAN is block storage, so the operating system sees it like a raw disk, while object storage keeps data in large scalable objects addressed by IDs.`,
            50: `These are storage and boot safety tools. The boot block starts the boot process, Error Correcting Codes and Cyclic Redundancy Checks catch bit errors, and sector sparing hides damaged sectors by silently moving the data to a spare location.`,
            51: `A raw partition is faster because the operating system does not need to go through file system metadata every time it reads or writes swap. That gives more direct block access and avoids extra overhead when memory is under pressure.`,
            52: `Progress means the system must not keep postponing the choice of who enters the critical section next when the section is empty. If the decision keeps getting delayed forever, the system is failing to make forward progress.`,
            53: `Atomic means indivisible. The operation happens as one complete unit, so other threads never see a half-finished state in the middle of the instruction.`,
            54: `TestAndSet combines a read and a write into one atomic action. It checks the memory value and sets it to true immediately, which is why it can be used to build a lock.`,
            55: `CompareAndSwap first checks whether the current value matches an expected value. Only if the values match does it write the new value; otherwise it leaves memory unchanged, which makes it useful for safe lock-free updates.`,
            56: `A memory barrier makes the processor respect ordering. Without it, the processor may reorder loads and stores for speed, but with the barrier in place the program's intended read and write order is preserved.`,
            57: `Base and Limit protect memory by defining a legal range. Base is the starting physical address, and Limit is the size of the allowed region, so any access outside that window is rejected.`,
            58: `Progress is the rule that says the system cannot keep the critical-section choice blocked forever if nobody is already inside the section. In other words, when the section is free, the operating system must eventually choose someone to enter.`,
            59: `First-fit is simple: scan from the beginning and use the first hole that is large enough. It does not try to be clever about the largest or smallest hole, so it is fast but can leave awkward leftovers.`,
            60: `Internal fragmentation is wasted space inside allocated memory. The process gets a block larger than it needs, and the unused part inside that block cannot be used by anyone else until the block is released.`,
            61: `The valid-invalid bit tells the operating system whether a page is currently in memory and allowed to be used. If the bit says invalid, then touching that page causes a fault or is not yet permitted.`,
            62: `Two page table entries can point to the same physical frame for a while, which is useful when processes share data or when fork starts with shared pages. If one process writes, the operating system makes a private copy for that writer.`,
            63: `A monitor is a high-level synchronization wrapper. It guarantees that only one process can be active inside it at a time, and it bundles the shared data with the operations that control that data.`,
            64: `x.wait() puts the calling thread to sleep inside the condition queue and releases the monitor lock. That matters because another thread must be allowed to enter, change the condition, and later signal the waiting thread.`,
            65: `Global replacement means frames can be taken from other processes if needed, while local replacement keeps the eviction inside the current process's own frames. The difference is whether the frame pool is shared or private.`,
            66: `When demand is greater than memory, thrashing is the result. The operating system should reduce the degree of multiprogramming by suspending some processes so the remaining ones have enough frames to run productively.`,
            67: `Hard disk drives use a few basic geometry terms. Tracks are circles on a platter, sectors are slices of a track, platters are the spinning disks themselves, and a cylinder is the set of tracks at the same arm position across platters.`,
            68: `Positioning time is the mechanical time needed before data transfer can begin. The arm must seek to the correct track and then the disk must wait for the target sector to rotate under the head, so the formula is seek time plus rotational latency.`,
            69: `First-Come First-Served is fair but can make the head travel a long distance. SCAN goes to one end and reverses, while C-SCAN goes to one end and then jumps back to the other end, so those algorithms are all about controlling head movement.`,
            70: `NAS gives file-level access over a network, host-attached storage uses local connections such as SATA or USB, and SAN gives block-level access over a dedicated network. Those are the three standard storage models being contrasted here.`,
            71: `Parity bits, Error Correcting Code, and Cyclic Redundancy Check are all used to detect or correct storage errors. They help the system notice when data has been corrupted, while TLB flushing is about address translation and has nothing to do with disk integrity.`,
            72: `The boot block, often called the Master Boot Record, is the first small piece of code on the disk that starts the boot process. It contains the startup code that finds or loads the next stage of the bootloader and helps bring the operating system into memory.`,
            73: `Sector sparing protects the system from bad disk blocks. When a sector is damaged, the controller remaps the logical address to a hidden spare sector so the operating system can keep using the disk without knowing about the failure.`,
            74: `These are the real reasons modern paging hardware is designed the way it is. A flat 64-bit table would be enormous, x86-64 uses multiple page-table levels, inverted page tables store one entry per physical frame, and ARMv8 uses multiple TLB layers with small instruction and data caches for translations.`,
            75: `When recovering from deadlock, the operating system tries to choose the victim that causes the least damage. It looks at how many resources the process has used, whether it is interactive or batch, its priority, how long it has run, and how many more resources it still needs.`,
            76: `A wait-for graph removes the resource nodes and keeps only process-to-process waiting edges. That makes it easier to spot cycles, and in a single-instance resource system a cycle means deadlock.`,
        };

        function attachQuestionExplanations(data) {
            data.forEach((question) => {
                question.explanation = questionExplanations[question.id] || '';
            });
        }

        let quizData = [];
        let currentStage = 'start'; // 'start', 'quiz', 'results'
        let currentQuestionIndex = 0;
        let userAnswers = {}; // { questionId: [selectedOptionIndices...] }
        let confirmedQuestions = {}; // { questionId: feedbackObject }
        let flaggedQuestions = {}; // { questionId: true }
        let sidebarScrollTop = 0;
        let shouldAutoScrollSidebarToCurrentQuestion = false;

        function getDefaultQuizState() {
            return {
                currentStage: 'start',
                currentQuestionIndex: 0,
                userAnswers: {},
                confirmedQuestions: {},
                flaggedQuestions: {},
                quizData: buildQuizData(quizDataSource)
            };
        }

        function loadQuizState() {
            try {
                const savedState = window.localStorage.getItem(STORAGE_KEY);
                if (!savedState) {
                    return null;
                }

                const parsedState = JSON.parse(savedState);
                if (!parsedState || !isValidQuizData(parsedState.quizData)) {
                    return null;
                }

                return parsedState;
            } catch (error) {
                return null;
            }
        }

        function saveQuizState() {
            if (!quizData.length) {
                return;
            }

            try {
                window.localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    currentStage,
                    currentQuestionIndex,
                    userAnswers,
                    confirmedQuestions,
                    flaggedQuestions,
                    quizData
                }));
            } catch (error) {
                // Ignore storage failures and keep the quiz usable.
            }
        }

        function clearQuizState() {
            try {
                window.localStorage.removeItem(STORAGE_KEY);
            } catch (error) {
                // Ignore storage failures.
            }
        }

        function resetAllUserData() {
            clearQuizState();
            applyQuizState(getDefaultQuizState());
            sidebarScrollTop = 0;
            shouldAutoScrollSidebarToCurrentQuestion = false;
            render();
        }

        function getCorrectIndices(question) {
            const correct = [];
            question.options.forEach((opt, idx) => {
                if (opt.isCorrect) correct.push(idx);
            });
            return correct;
        }

        function isExactMatch(selected, correct) {
            const sortedSelected = [...selected].sort((a, b) => a - b);
            const sortedCorrect = [...correct].sort((a, b) => a - b);
            return sortedSelected.length === sortedCorrect.length &&
                sortedSelected.every((val, index) => val === sortedCorrect[index]);
        }

        function getQuestionFeedback(question, selectedOptions) {
            const correctIndices = getCorrectIndices(question);
            const hasWrongSelection = selectedOptions.some((idx) => !question.options[idx].isCorrect);
            const missedCorrect = correctIndices.some((idx) => !selectedOptions.includes(idx));
            const exact = isExactMatch(selectedOptions, correctIndices);

            return {
                correctIndices,
                hasWrongSelection,
                missedCorrect,
                exact
            };
        }

        function getOptionCardClass(question, option, isSelected, confirmedFeedback) {
            let cardClass = 'border-gray-200 hover:border-blue-300 hover:bg-gray-50';

            if (confirmedFeedback && option.isCorrect) {
                cardClass = 'border-green-500 bg-green-50';
            } else if (confirmedFeedback && isSelected && !option.isCorrect) {
                cardClass = 'border-red-500 bg-red-50';
            } else if (isSelected) {
                cardClass = 'border-blue-500 bg-blue-50';
            }

            return cardClass;
        }

        function getSidebarButtonClass(isCurrent, isAnswered, isConfirmed) {
            return isCurrent
                ? 'border-blue-600 bg-blue-50 text-blue-900'
                : isConfirmed
                    ? 'border-green-200 bg-white text-gray-700 hover:border-green-400'
                    : isAnswered
                        ? 'border-amber-200 bg-white text-gray-700 hover:border-amber-400'
                        : 'border-gray-200 bg-white text-gray-700 hover:border-blue-300';
        }

        function getSidebarBadgeClass(isCurrent, isConfirmed, isAnswered) {
            return isCurrent ? 'bg-blue-600 text-white' : isConfirmed ? 'bg-green-100 text-green-700' : isAnswered ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500';
        }

        function buildFeedbackHtml(question, confirmedFeedback) {
            if (!confirmedFeedback) {
                return '';
            }

            const feedbackClass = confirmedFeedback.exact
                ? 'bg-green-50 border-green-300 text-green-900'
                : 'bg-amber-50 border-amber-300 text-amber-900';
            const feedbackTitle = confirmedFeedback.exact
                ? 'Correct for scoring'
                : 'Not fully correct yet';
            const feedbackMessage = confirmedFeedback.exact
                ? (question.isMultiSelect
                    ? 'Great job. You selected all correct options and no wrong options.'
                    : 'Great job. Your selected option is correct.')
                : (question.isMultiSelect
                    ? 'For multi-select questions, you must select every correct option and avoid all incorrect ones.'
                    : 'That selected option is incorrect.');

            const correctAnswersText = confirmedFeedback.correctIndices
                .map((idx) => question.options[idx].text)
                .join(' | ');

            return `
                <div class="mt-5 p-4 border rounded-xl ${feedbackClass}" id="feedback-panel">
                    <h3 class="font-bold mb-1">${feedbackTitle}</h3>
                    <p class="text-sm mb-2">${feedbackMessage}</p>
                    <p class="text-sm mb-2"><span class="font-semibold">Correct answer${confirmedFeedback.correctIndices.length > 1 ? 's' : ''}:</span> ${correctAnswersText}</p>
                    <p class="text-sm"><span class="font-semibold">Why this is correct:</span> ${question.explanation}</p>
                </div>
            `;
        }

        function applyQuizState(state) {
            quizData = state.quizData;
            currentStage = state.currentStage || 'start';
            currentQuestionIndex = Number.isInteger(state.currentQuestionIndex) ? Math.min(Math.max(state.currentQuestionIndex, 0), quizData.length - 1) : 0;
            userAnswers = state.userAnswers || {};
            confirmedQuestions = state.confirmedQuestions || {};
            flaggedQuestions = state.flaggedQuestions || {};
            attachQuestionExplanations(quizData);
        }

        const restoredQuizState = loadQuizState();
        if (restoredQuizState) {
            applyQuizState(restoredQuizState);
            shouldAutoScrollSidebarToCurrentQuestion = currentStage === 'quiz';
        } else {
            applyQuizState(getDefaultQuizState());
            saveQuizState();
        }

        window.addEventListener('beforeunload', saveQuizState);

        function updateSidebarState() {
            const flaggedCount = document.getElementById('flagged-count');
            if (flaggedCount) {
                flaggedCount.textContent = `${Object.keys(flaggedQuestions).length} flagged`;
            }

            quizData.forEach((item, index) => {
                const sidebarButton = document.getElementById(`sidebar-question-${item.id}`);
                if (!sidebarButton) {
                    return;
                }

                const isCurrent = index === currentQuestionIndex;
                const isAnswered = Array.isArray(userAnswers[item.id]) && userAnswers[item.id].length > 0;
                const isConfirmed = !!confirmedQuestions[item.id];
                const isItemFlagged = !!flaggedQuestions[item.id];

                sidebarButton.className = `w-full flex items-center justify-between px-3 py-2 rounded-lg border text-left transition ${getSidebarButtonClass(isCurrent, isAnswered, isConfirmed)}`;
                sidebarButton.innerHTML = `
                    <span class="flex items-center gap-2 min-w-0">
                        <span class="inline-flex h-6 w-6 items-center justify-center rounded-full text-xs font-bold ${getSidebarBadgeClass(isCurrent, isConfirmed, isAnswered)}">${index + 1}</span>
                        <span class="truncate">Q${index + 1}</span>
                    </span>
                    <span class="flex items-center gap-2 text-xs">
                        ${isConfirmed ? '<span class="text-green-600 font-semibold">Checked</span>' : ''}
                        ${isItemFlagged ? '<span class="text-amber-600 font-semibold">Flagged</span>' : ''}
                    </span>
                `;
            });
        }

        function updateCurrentQuestionDom() {
            if (currentStage !== 'quiz') {
                return;
            }

            const question = quizData[currentQuestionIndex];
            const selectedOptions = userAnswers[question.id] || [];
            const confirmedFeedback = confirmedQuestions[question.id] || null;
            const isFlagged = !!flaggedQuestions[question.id];

            const progressFill = document.getElementById('quiz-progress-fill');
            if (progressFill) {
                progressFill.style.width = `${(currentQuestionIndex / quizData.length) * 100}%`;
            }

            const questionCounter = document.getElementById('question-counter');
            if (questionCounter) {
                questionCounter.textContent = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
            }

            const questionTypeBadge = document.getElementById('question-type-badge');
            if (questionTypeBadge) {
                questionTypeBadge.innerHTML = question.isMultiSelect
                    ? '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg> Select ALL that apply'
                    : 'Single Choice';
            }

            const flagButton = document.getElementById('flag-question-button');
            if (flagButton) {
                flagButton.textContent = isFlagged ? 'Unflag' : 'Flag';
                flagButton.className = `px-3 py-1.5 rounded-full border text-xs font-bold transition ${isFlagged ? 'bg-amber-100 border-amber-300 text-amber-800' : 'bg-white border-gray-300 text-gray-600 hover:bg-amber-50 hover:border-amber-300'}`;
            }

            const statusText = document.getElementById('question-status-text');
            if (statusText) {
                statusText.textContent = confirmedFeedback ? 'Answer checked for this question.' : 'Select your answer, then click Confirm Answer.';
            }

            const confirmedBadge = document.getElementById('confirmed-status-badge');
            if (confirmedBadge) {
                confirmedBadge.innerHTML = confirmedFeedback ? '<span class="px-3 py-1 rounded-full bg-blue-50 text-blue-700 font-semibold">Confirmed</span>' : '';
            }

            const questionText = document.getElementById('question-text');
            if (questionText) {
                questionText.textContent = question.text;
            }

            question.options.forEach((option, idx) => {
                const isSelected = selectedOptions.includes(idx);
                const optionLabel = document.getElementById(`option-card-${question.id}-${idx}`);
                const optionInput = document.getElementById(`option-input-${question.id}-${idx}`);
                const optionChip = document.getElementById(`option-chip-${question.id}-${idx}`);

                if (optionInput) {
                    optionInput.checked = isSelected;
                }

                if (optionLabel) {
                    optionLabel.className = `option-card flex items-start p-4 border-2 rounded-xl cursor-pointer ${getOptionCardClass(question, option, isSelected, confirmedFeedback)} mb-3`;
                }

                if (optionChip) {
                    if (confirmedFeedback) {
                        optionChip.classList.remove('hidden');
                        if (option.isCorrect) {
                            optionChip.className = 'ml-2 inline-block px-2 py-0.5 rounded bg-green-100 text-green-700 text-xs font-bold uppercase';
                            optionChip.textContent = 'Correct';
                        } else if (isSelected) {
                            optionChip.className = 'ml-2 inline-block px-2 py-0.5 rounded bg-red-100 text-red-700 text-xs font-bold uppercase';
                            optionChip.textContent = 'Incorrect';
                        } else {
                            optionChip.className = 'hidden';
                            optionChip.textContent = '';
                        }
                    } else {
                        optionChip.className = 'hidden';
                        optionChip.textContent = '';
                    }
                }
            });

            const feedbackContainer = document.getElementById('feedback-container');
            if (feedbackContainer) {
                feedbackContainer.innerHTML = buildFeedbackHtml(question, confirmedFeedback);
            }

            const previousButton = document.getElementById('previous-question-button');
            if (previousButton) {
                previousButton.disabled = currentQuestionIndex === 0;
                previousButton.className = `px-6 py-3 border-2 border-gray-300 text-gray-700 font-semibold rounded-lg transition ${currentQuestionIndex === 0 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-50'}`;
            }

            const nextButton = document.getElementById('next-question-button');
            const submitButton = document.getElementById('submit-exam-button');
            const canAdvance = !!confirmedFeedback;

            if (nextButton) {
                nextButton.disabled = !canAdvance;
                nextButton.className = `px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow transition flex items-center ${canAdvance ? '' : 'opacity-40 cursor-not-allowed'}`;
            }

            if (submitButton) {
                submitButton.disabled = !canAdvance;
                submitButton.className = `px-8 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow transition flex items-center ${canAdvance ? '' : 'opacity-40 cursor-not-allowed'}`;
            }

            updateSidebarState();
            saveQuizState();
        }

        function syncQuizScreen() {
            updateCurrentQuestionDom();
        }

        // --- 2. STATE MANAGEMENT ---

        function getCorrectIndices(question) {
            const correct = [];
            question.options.forEach((opt, idx) => {
                if (opt.isCorrect) correct.push(idx);
            });
            return correct;
        }

        function isExactMatch(selected, correct) {
            const sortedSelected = [...selected].sort((a, b) => a - b);
            const sortedCorrect = [...correct].sort((a, b) => a - b);
            return sortedSelected.length === sortedCorrect.length &&
                sortedSelected.every((val, index) => val === sortedCorrect[index]);
        }

        function getQuestionFeedback(question, selectedOptions) {
            const correctIndices = getCorrectIndices(question);
            const hasWrongSelection = selectedOptions.some((idx) => !question.options[idx].isCorrect);
            const missedCorrect = correctIndices.some((idx) => !selectedOptions.includes(idx));
            const exact = isExactMatch(selectedOptions, correctIndices);

            return {
                correctIndices,
                hasWrongSelection,
                missedCorrect,
                exact
            };
        }

        function toggleFlag(questionId) {
            if (flaggedQuestions[questionId]) {
                delete flaggedQuestions[questionId];
            } else {
                flaggedQuestions[questionId] = true;
            }
            syncQuizScreen();
        }

        function saveSidebarScrollPosition() {
            const sidebarList = document.getElementById('quiz-sidebar-list');
            if (sidebarList) {
                sidebarScrollTop = sidebarList.scrollTop;
            }
        }

        function restoreSidebarScrollPosition() {
            const sidebarList = document.getElementById('quiz-sidebar-list');
            if (!sidebarList) {
                return;
            }

            if (shouldAutoScrollSidebarToCurrentQuestion) {
                const currentSidebarItem = document.getElementById(`sidebar-question-${quizData[currentQuestionIndex].id}`);
                if (currentSidebarItem) {
                    currentSidebarItem.scrollIntoView({ block: 'center' });
                }
                shouldAutoScrollSidebarToCurrentQuestion = false;
                return;
            }

            sidebarList.scrollTop = sidebarScrollTop;
        }

        function goToQuestion(questionIndex) {
            if (questionIndex < 0 || questionIndex >= quizData.length) {
                return;
            }

            saveSidebarScrollPosition();
            currentQuestionIndex = questionIndex;
            render();
            saveQuizState();
            window.scrollTo(0, 0);
        }

        // --- 3. DOM ELEMENTS & RENDER FUNCTIONS ---
        const app = document.getElementById('app');

        function render() {
            app.innerHTML = '';
            if (currentStage === 'start') {
                renderStartScreen();
            } else if (currentStage === 'quiz') {
                renderQuizScreen(true);
                restoreSidebarScrollPosition();
            } else if (currentStage === 'results') {
                renderResultsScreen();
            }
        }

        function renderStartScreen() {
            app.innerHTML = `
                <div class="flex-grow flex items-center justify-center fade-in py-3 sm:py-6">
                    <div class="bg-white rounded-2xl panel-shadow p-5 sm:p-6 md:p-8 max-w-3xl w-full text-center border border-slate-200 border-t-4 border-blue-600">
                        <div class="mb-5 sm:mb-6 flex justify-center">
                            <svg class="w-14 h-14 sm:w-16 sm:h-16 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                        </div>
                        <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 mb-3 sm:mb-4 leading-tight">Operating Systems Exam II</h1>
                        <h2 class="text-base sm:text-xl font-semibold text-gray-600 mb-5 sm:mb-6">Complete Exhaustive Quiz</h2>
                        <div class="bg-blue-50 text-blue-800 rounded-xl p-4 sm:p-5 mb-6 sm:mb-8 text-left text-sm space-y-2">
                            <p><strong>Scope:</strong> Chapters 6 - 11 (Stopping before RAID)</p>
                            <p><strong>Questions:</strong> ${quizData.length} Comprehensive Items</p>
                            <p><strong>Warning (The Checkbox Rule):</strong> This exam utilizes multi-select questions. You must select ALL correct answers. Selecting a correct answer alongside an incorrect one = ZERO points.</p>
                        </div>
                        <button onclick="startQuiz()" class="w-full sm:w-auto px-6 sm:px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition transform hover:-translate-y-1 text-base sm:text-lg">
                            Begin Exam Simulation
                        </button>
                    </div>
                </div>
            `;
        }

        function renderQuizScreen(animate = false) {
            saveSidebarScrollPosition();

            const question = quizData[currentQuestionIndex];
            const selectedOptions = userAnswers[question.id] || [];
            const confirmedFeedback = confirmedQuestions[question.id] || null;
            const isFlagged = !!flaggedQuestions[question.id];

            const progressPct = ((currentQuestionIndex) / quizData.length) * 100;

            const optionsHtml = question.options.map((opt, idx) => {
                const isSelected = selectedOptions.includes(idx);
                const inputType = question.isMultiSelect ? 'checkbox' : 'radio';
                const cardClass = getOptionCardClass(question, opt, isSelected, confirmedFeedback);
                const chipClass = confirmedFeedback
                    ? (opt.isCorrect
                        ? 'ml-2 inline-block px-2 py-0.5 rounded bg-green-100 text-green-700 text-xs font-bold uppercase'
                        : (isSelected
                            ? 'ml-2 inline-block px-2 py-0.5 rounded bg-red-100 text-red-700 text-xs font-bold uppercase'
                            : 'hidden'))
                    : 'hidden';
                const chipText = confirmedFeedback
                    ? (opt.isCorrect
                        ? 'Correct'
                        : (isSelected ? 'Incorrect' : ''))
                    : '';

                return `
                    <label id="option-card-${question.id}-${idx}" class="option-card flex items-start p-4 border-2 rounded-xl cursor-pointer ${cardClass} mb-3">
                        <div class="flex-shrink-0 mt-0.5">
                            <input id="option-input-${question.id}-${idx}" type="${inputType}" name="q${question.id}" value="${idx}"
                                ${isSelected ? 'checked' : ''}
                                onchange="toggleOption(${question.id}, ${idx}, ${question.isMultiSelect})"
                                class="w-5 h-5 text-blue-600 border-gray-300 ${question.isMultiSelect ? 'rounded' : 'rounded-full'} focus:ring-blue-500">
                        </div>
                        <div class="ml-3 text-base text-gray-700 font-medium">
                            ${opt.text}<span id="option-chip-${question.id}-${idx}" class="${chipClass}">${chipText}</span>
                        </div>
                    </label>
                `;
            }).join('');

            const feedbackHtml = buildFeedbackHtml(question, confirmedFeedback);

            const sidebarItems = quizData.map((item, index) => {
                const itemId = item.id;
                const isCurrent = index === currentQuestionIndex;
                const isAnswered = Array.isArray(userAnswers[itemId]) && userAnswers[itemId].length > 0;
                const isConfirmed = !!confirmedQuestions[itemId];
                const isItemFlagged = !!flaggedQuestions[itemId];

                return `
                    <button id="sidebar-question-${item.id}" type="button" onclick="goToQuestion(${index})" class="w-full flex items-center justify-between px-3 py-2 rounded-lg border text-left transition ${getSidebarButtonClass(isCurrent, isAnswered, isConfirmed)}">
                        <span class="flex items-center gap-2 min-w-0">
                            <span class="inline-flex h-6 w-6 items-center justify-center rounded-full text-xs font-bold ${getSidebarBadgeClass(isCurrent, isConfirmed, isAnswered)}">${index + 1}</span>
                            <span class="truncate">Q${index + 1}</span>
                        </span>
                        <span class="flex items-center gap-2 text-xs">
                            ${isConfirmed ? '<span class="text-green-600 font-semibold">Checked</span>' : ''}
                            ${isItemFlagged ? '<span class="text-amber-600 font-semibold">Flagged</span>' : ''}
                        </span>
                    </button>
                `;
            }).join('');

            app.innerHTML = `
                <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6 shadow-inner">
                    <div id="quiz-progress-fill" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: ${progressPct}%"></div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-[minmax(0,1fr)_320px] gap-4 sm:gap-5 lg:gap-6 flex-grow items-start">
                    <div class="bg-white rounded-2xl shadow-lg p-4 sm:p-6 md:p-8 ${animate ? 'fade-in' : ''} flex flex-col min-w-0">
                        <div class="flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center mb-5 sm:mb-6">
                            <span id="question-counter" class="text-xs sm:text-sm font-bold text-gray-500 uppercase tracking-wider">Question ${currentQuestionIndex + 1} of ${quizData.length}</span>
                            <div class="flex items-center gap-2 flex-wrap justify-start sm:justify-end">
                                <span id="question-type-badge" class="${question.isMultiSelect ? 'bg-yellow-100 text-yellow-800 flex items-center' : 'bg-gray-100 text-gray-600'} text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">${question.isMultiSelect ? '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg> Select ALL that apply' : 'Single Choice'}</span>
                                <button id="flag-question-button" type="button" onclick="toggleFlag(${question.id})" class="px-3 py-1.5 rounded-full border text-xs font-bold transition ${isFlagged ? 'bg-amber-100 border-amber-300 text-amber-800' : 'bg-white border-gray-300 text-gray-600 hover:bg-amber-50 hover:border-amber-300'}">
                                    ${isFlagged ? 'Unflag' : 'Flag'}
                                </button>
                            </div>
                        </div>

                        <div class="mb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 text-sm text-gray-600">
                            <span id="question-status-text">${confirmedFeedback ? 'Answer checked for this question.' : 'Select your answer, then click Confirm Answer.'}</span>
                            <span id="confirmed-status-badge">${confirmedFeedback ? '<span class="px-3 py-1 rounded-full bg-blue-50 text-blue-700 font-semibold">Confirmed</span>' : ''}</span>
                        </div>

                        <h2 id="question-text" class="text-lg sm:text-xl md:text-2xl font-semibold text-gray-900 mb-6 sm:mb-8 leading-relaxed">
                            ${question.text}
                        </h2>

                        <div class="flex-grow" id="question-options-container">
                            ${optionsHtml}
                            <div id="feedback-container">${feedbackHtml}</div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 items-center mt-8 pt-6 border-t border-gray-100">
                            <button id="previous-question-button" type="button" onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''} class="w-full px-5 py-3 border-2 border-gray-300 text-gray-700 font-semibold rounded-lg transition ${currentQuestionIndex === 0 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-50'}">
                                Previous
                            </button>

                            <button id="confirm-question-button" type="button" onclick="confirmQuestion()" class="w-full px-5 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg shadow transition">
                                Confirm Answer
                            </button>

                            ${currentQuestionIndex === quizData.length - 1
                                ? `<button id="submit-exam-button" type="button" onclick="nextQuestion()" ${confirmedFeedback ? '' : 'disabled'} class="w-full px-5 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow transition flex items-center justify-center ${confirmedFeedback ? '' : 'opacity-40 cursor-not-allowed'}">Submit Exam</button>`
                                : `<button id="next-question-button" type="button" onclick="nextQuestion()" ${confirmedFeedback ? '' : 'disabled'} class="w-full px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow transition flex items-center justify-center ${confirmedFeedback ? '' : 'opacity-40 cursor-not-allowed'}">Next <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>`
                            }
                        </div>
                    </div>

                    <aside class="bg-white rounded-2xl shadow-lg p-4 sm:p-5 lg:p-6 xl:sticky xl:top-6 h-fit">
                        <div class="flex items-start sm:items-center justify-between mb-4 gap-3 flex-col sm:flex-row">
                            <div>
                                <h3 class="text-base sm:text-lg font-bold text-gray-900">Questions</h3>
                                <span id="flagged-count" class="text-xs font-semibold text-gray-500">${Object.keys(flaggedQuestions).length} flagged</span>
                            </div>
                            <button type="button" onclick="resetAllUserData()" class="w-full sm:w-auto px-3 py-2 rounded-lg border border-red-300 text-red-700 text-xs font-bold uppercase tracking-wide hover:bg-red-50 transition">
                                Reset Data
                            </button>
                        </div>
                        <div id="quiz-sidebar-list" class="grid grid-cols-1 gap-2 max-h-[42vh] sm:max-h-[48vh] lg:max-h-[60vh] overflow-y-auto pr-1">
                            ${sidebarItems}
                        </div>
                    </aside>
                </div>
            `;

            restoreSidebarScrollPosition();
        }

        function renderResultsScreen() {
            let score = 0;
            let resultsHtml = '';

            quizData.forEach((q, idx) => {
                const userSelected = userAnswers[q.id] || [];
                const correctIndices = [];
                q.options.forEach((opt, i) => { if(opt.isCorrect) correctIndices.push(i); });
                
                // Sorting arrays to compare easily
                userSelected.sort();
                correctIndices.sort();
                
                // Checkbox Rule enforcement: Array contents must match perfectly
                const isPerfectMatch = userSelected.length === correctIndices.length && 
                                       userSelected.every((val, index) => val === correctIndices[index]);

                if (isPerfectMatch) {
                    score++;
                }

                // Generate Review UI
                let optsReviewHtml = '';
                q.options.forEach((opt, i) => {
                    const wasSelected = userSelected.includes(i);
                    const isCorrect = opt.isCorrect;
                    
                    let styleClass = "text-gray-600";
                    let icon = '';
                    
                    if (wasSelected && isCorrect) {
                        styleClass = "bg-green-100 text-green-800 font-medium p-2 rounded";
                        icon = '✅';
                    } else if (wasSelected && !isCorrect) {
                        styleClass = "bg-red-100 text-red-800 font-medium p-2 rounded";
                        icon = '❌';
                    } else if (!wasSelected && isCorrect) {
                        styleClass = "bg-yellow-100 text-yellow-800 font-medium p-2 rounded border border-yellow-300";
                        icon = '⚠️ (Missed)';
                    } else {
                        styleClass = "p-2";
                    }

                    optsReviewHtml += `<div class="${styleClass} text-sm mb-1">${icon} ${opt.text}</div>`;
                });

                resultsHtml += `
                    <div class="mb-6 p-4 border rounded-lg ${isPerfectMatch ? 'border-green-300 bg-green-50' : 'border-red-300 bg-red-50'}">
                        <div class="flex items-start">
                            <div class="mr-3 mt-1">
                                ${isPerfectMatch 
                                    ? '<span class="text-green-600 font-bold text-xl">✓</span>' 
                                    : '<span class="text-red-600 font-bold text-xl">✗</span>'}
                            </div>
                            <div class="w-full">
                                <h4 class="font-semibold text-gray-800 mb-2">${idx + 1}. ${q.text}</h4>
                                <div class="space-y-1">
                                    ${optsReviewHtml}
                                </div>
                                <p class="mt-3 text-sm text-gray-700 bg-blue-50 border border-blue-100 rounded p-3">
                                    <span class="font-semibold">Explanation:</span> ${q.explanation}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            });

            const percentage = Math.round((score / quizData.length) * 100);
            let message = '';
            if (percentage >= 90) message = "Outstanding! You are fully prepared for the exam.";
            else if (percentage >= 70) message = "Good job! Review the traps and tricky questions.";
            else message = "Keep studying! The hardware connections and deadlock math need review.";

            app.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl p-8 fade-in w-full">
                    <div class="text-center mb-8 sm:mb-10 pb-8 border-b border-gray-200">
                        <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-2">Exam Results</h2>
                        <div class="text-5xl sm:text-6xl font-black ${percentage >= 70 ? 'text-green-600' : 'text-orange-600'} my-4">
                            ${percentage}%
                        </div>
                        <p class="text-lg sm:text-xl text-gray-600 font-medium">You scored ${score} out of ${quizData.length}</p>
                        <p class="text-md text-gray-500 mt-2 italic">${message}</p>
                        <div class="mt-6 flex flex-col sm:flex-row justify-center gap-3">
                            <button onclick="restartQuiz()" class="px-6 py-2 bg-gray-800 hover:bg-gray-900 text-white font-semibold rounded-lg shadow transition">
                            Retake Exam
                            </button>
                            <button onclick="resetAllUserData()" class="px-6 py-2 border border-red-300 text-red-700 font-semibold rounded-lg transition hover:bg-red-50">
                            Reset Saved Data
                            </button>
                        </div>
                    </div>
                    
                    <div class="h-96 overflow-y-auto pr-4">
                        <h3 class="text-2xl font-bold text-gray-800 mb-4 sticky top-0 bg-white py-2 shadow-sm">Detailed Review</h3>
                        ${resultsHtml}
                    </div>
                </div>
            `;
        }

        // --- 4. LOGIC FUNCTIONS ---
        function startQuiz() {
            saveSidebarScrollPosition();
            currentStage = 'quiz';
            currentQuestionIndex = 0;
            userAnswers = {};
            confirmedQuestions = {};
            flaggedQuestions = {};
            saveQuizState();
            render();
        }

        function toggleOption(questionId, optionIndex, isMultiSelect) {
            if (!userAnswers[questionId]) {
                userAnswers[questionId] = [];
            }

            delete confirmedQuestions[questionId];
            
            if (isMultiSelect) {
                const index = userAnswers[questionId].indexOf(optionIndex);
                if (index > -1) {
                    userAnswers[questionId].splice(index, 1); // Remove if already selected
                } else {
                    userAnswers[questionId].push(optionIndex); // Add if not selected
                }
            } else {
                userAnswers[questionId] = [optionIndex]; // Replace completely
            }
            syncQuizScreen(); // Update option state without replaying the card animation
        }

        function confirmQuestion() {
            const question = quizData[currentQuestionIndex];
            const selectedOptions = userAnswers[question.id] || [];
            confirmedQuestions[question.id] = getQuestionFeedback(question, selectedOptions);
            syncQuizScreen();
        }

        function nextQuestion() {
            const currentQuestion = quizData[currentQuestionIndex];
            if (!confirmedQuestions[currentQuestion.id]) {
                return;
            }

            if (currentQuestionIndex < quizData.length - 1) {
                saveSidebarScrollPosition();
                currentQuestionIndex++;
                render();
                saveQuizState();
                window.scrollTo(0, 0);
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                saveSidebarScrollPosition();
                currentQuestionIndex--;
                render();
                saveQuizState();
                window.scrollTo(0, 0);
            }
        }

        function finishQuiz() {
            const confirmSubmit = confirm("Are you sure you want to submit your exam?");
            if (confirmSubmit) {
                saveSidebarScrollPosition();
                currentStage = 'results';
                saveQuizState();
                render();
                window.scrollTo(0, 0);
            }
        }

        function restartQuiz() {
            clearQuizState();
            currentStage = 'start';
            userAnswers = {};
            confirmedQuestions = {};
            flaggedQuestions = {};
            currentQuestionIndex = 0;
            render();
        }

        // --- 5. INITIALIZE ---
        render();

    </script>
    </body>
</html>
