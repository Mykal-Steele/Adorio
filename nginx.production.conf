events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name adorio.space www.adorio.space;
    absolute_redirect off;
    port_in_redirect off;

    # Express API
    location /api/ {
      proxy_pass http://localhost:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI-Slop static
    location /cao/ {
      alias /usr/share/nginx/html/cao/;
      try_files $uri $uri/ /cao/index.html;
    }
    location = /cao {
      return 301 https://adorio.space/cao/;
    }

    # Next.js static assets — long cache, can be buffered
    location /_next/static/ {
      proxy_pass http://localhost:3001;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_buffering on;
    }

    # Everything else → Next.js SSR
    # proxy_buffering off is CRITICAL for Suspense streaming to work
    location / {
      proxy_pass http://localhost:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 60s;
    }
  }
}