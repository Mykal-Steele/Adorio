name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: TypeScript + build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      BACKEND_INTERNAL_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

  integration:
    name: Integration tests (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm run setup
      - name: Set Puppeteer Chrome path
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium-browser 2>/dev/null || which chromium 2>/dev/null || echo "")
          if [ -n "$CHROME" ]; then
            echo "Using system Chrome: $CHROME"
            echo "PUPPETEER_EXECUTABLE_PATH=$CHROME" >> $GITHUB_ENV
          else
            echo "System Chrome not found, installing via puppeteer"
            rm -rf ~/.cache/puppeteer
            node node_modules/.bin/puppeteer browsers install chrome
          fi
      - name: Create .env.production
        run: |
          echo "NODE_ENV=production" >> .env.production
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env.production
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.production
          echo "REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}" >> .env.production
          echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> .env.production
          echo "CLOUDINARY_NAME=${{ secrets.CLOUDINARY_NAME }}" >> .env.production
          echo "CLOUDINARY_KEY=${{ secrets.CLOUDINARY_KEY }}" >> .env.production
          echo "CLOUDINARY_SECRET=${{ secrets.CLOUDINARY_SECRET }}" >> .env.production
          echo "CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}" >> .env.production
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env.production
      - name: Run integration tests
        run: npm run test:prod

  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/Adorio
            git pull origin main
            export VITE_GEMINI_API_KEY="${{ secrets.VITE_GEMINI_API_KEY }}"
            npm run docker:redeploy
