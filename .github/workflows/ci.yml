name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: TypeScript + build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      BACKEND_INTERNAL_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  integration:
    name: Integration tests (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Create .env.production
        run: |
          echo "NODE_ENV=production" >> .env.production
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env.production
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.production
          echo "REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}" >> .env.production
          echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> .env.production
          echo "CLOUDINARY_NAME=${{ secrets.CLOUDINARY_NAME }}" >> .env.production
          echo "CLOUDINARY_KEY=${{ secrets.CLOUDINARY_KEY }}" >> .env.production
          echo "CLOUDINARY_SECRET=${{ secrets.CLOUDINARY_SECRET }}" >> .env.production
          echo "CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}" >> .env.production
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env.production
      - name: Run integration tests
        run: npm run test:prod

  audit:
    name: Live site audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Wait for Northflank to deploy (5 min)
        run: sleep 300
      - name: Run site audit
        run: node scripts/audit.mjs https://adorio.space
      - name: Publish latest report to repo
        run: |
          latest=$(ls -t reports/audit-*.html 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            cp "$latest" public/performance-report.html
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/performance-report.html
            git diff --cached --quiet || git commit -m "chore: update performance report [skip ci]"
            git push
          fi
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.sha }}
          path: reports/
          retention-days: 90
