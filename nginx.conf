upstream next_app {
  server app:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  if ($host$request_uri = social.adorio.space/) {
    add_header Cache-Control "public, max-age=86400" always;
    return 308 /social;
  }

  if ($host$uri = adorio.space/social) {
    add_header Cache-Control "public, max-age=86400" always;
    return 308 https://social.adorio.space/social$is_args$args;
  }

  if ($host$uri = www.adorio.space/social) {
    add_header Cache-Control "public, max-age=86400" always;
    return 308 https://social.adorio.space/social$is_args$args;
  }

  location = /nginx-health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location /_next/static/ {
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /_next/image {
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
  }

  location / {
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }
}
